<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار شامل في ديداكتيك الرياضيات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f3f4f6;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .correct-answer {
            background-color: #10b981 !important; /* Tailwind Green 500 */
            color: white !important;
            border-color: #059669 !important;
        }
        .wrong-answer {
            background-color: #ef4444 !important; /* Tailwind Red 500 */
            color: white !important;
            border-color: #dc2626 !important;
        }
        .disabled-btn {
            pointer-events: none;
            opacity: 0.8;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Start Screen -->
    <div id="start-screen" class="bg-white rounded-2xl shadow-xl p-8 max-w-2xl w-full text-center fade-in">
        <div class="mb-6 flex justify-center">
            <svg class="w-20 h-20 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-4">الاختبار الشامل في ديداكتيك الرياضيات</h1>
        <p class="text-gray-600 mb-8 text-lg">يتكون هذا الاختبار من 70 سؤالاً مستمدة من الفصول الخمسة (الإطار النظري، المبادئ، الأعداد، الهندسة، والقياس). اختبر معلوماتك الآن!</p>
        <button onclick="startQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full text-xl transition duration-300 shadow-lg transform hover:scale-105">
            ابدأ الاختبار
        </button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="bg-white rounded-2xl shadow-xl p-6 md:p-10 max-w-3xl w-full hidden">
        <div class="flex justify-between items-center mb-6">
            <span class="text-blue-600 font-bold bg-blue-100 py-1 px-4 rounded-full" id="question-counter">سؤال 1 / 70</span>
            <span class="text-green-600 font-bold bg-green-100 py-1 px-4 rounded-full" id="score-display">النقاط: 0</span>
        </div>
        
        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 rounded-full h-2.5 mb-8">
            <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <h2 id="question-text" class="text-2xl font-bold text-gray-800 mb-8 leading-relaxed">نص السؤال هنا...</h2>
        
        <div id="options-container" class="space-y-4">
            <!-- Options will be dynamically injected here -->
        </div>

        <div id="feedback-container" class="mt-6 hidden">
            <p id="feedback-text" class="font-bold text-lg mb-4"></p>
            <button id="next-btn" onclick="nextQuestion()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition duration-300 hidden">
                السؤال التالي
            </button>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="bg-white rounded-2xl shadow-xl p-8 max-w-2xl w-full text-center hidden">
        <div class="mb-6 flex justify-center">
            <svg class="w-24 h-24 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h1 class="text-4xl font-bold text-gray-800 mb-4">انتهى الاختبار!</h1>
        <p class="text-xl text-gray-600 mb-4">نتيجتك النهائية هي:</p>
        <div class="text-6xl font-black text-blue-600 mb-6" id="final-score">0 / 70</div>
        <p id="final-message" class="text-2xl font-bold text-gray-700 mb-8"></p>
        <button onclick="location.reload()" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded-full text-xl transition duration-300 shadow-lg">
            إعادة الاختبار
        </button>
    </div>

    <script>
        // 70 Questions extracted from the provided PDFs
        const questions = [
            // Chapter 1: Theoretical Framework
            { q: "ما هو التعريف الشائع لديداكتيك الرياضيات حسب الأدبيات التربوية؟", options: ["فن إدارة القسم", "فن تدريس الرياضيات", "علم النفس التربوي", "علم الاجتماع المدرسي"], ans: 1 },

            { q: "الانتقال من 'الكميات إلى الأعداد' يبدأ بـ:", options: ["المناولة الحسية للمجموعات الملموسة", "تعلم جدول الضرب", "كتابة الأرقام على السبورة", "حل المعادلات"], ans: 0 },
            { q: "المفهوم الذي يعبر عن تساوٍ منطقي بين مجموعات مختلفة هو:", options: ["الرتبة", "الكردينال (الرئيسي)", "القياس", "الهندسة"], ans: 1 },
            { q: "في مرحلة الانتقال من 'الواقع إلى الهندسة'، يتوقف الطفل عن رؤية الصندوق كأداة تخزين ويدركه كـ:", options: ["مجسم ثقيل", "متوازي مستطيلات له خصائص نظرية", "شيء ملون", "وحدة قياس"], ans: 1 },
            { q: "الانتقال من 'المقادير إلى القياس' يعتمد أساساً على إدراج مفهوم:", options: ["الكتلة", "الوحدة", "الشكل", "الزمن"], ans: 1 },
            { q: "القدرة على تحويل المشكلات الحياتية إلى علاقات منطقية تسمى بـ:", options: ["النمذجة الرياضية (ترييض الواقع)", "الحفظ الآلي", "دينامية الجماعة", "التواصل الوجداني"], ans: 0 },
            { q: "كلمة 'بيداغوجيا' في أصلها اليوناني كانت تطلق على:", options: ["المعلم الحكيم", "العبد الذي يقود الأطفال إلى المدرسة", "الكتاب المدرسي", "مدرسة الفلسفة"], ans: 1 },

            { q: "السؤال الديداكتيكي الجوهري هو:", options: ["كيف أنظم العمل في مجموعات؟", "كيف أصيغ المفهوم رياضياً ليكون قابلاً للاستيعاب؟", "كيف أحل الصراعات بين التلاميذ؟", "كيف أوزع المقاعد في القسم؟"], ans: 1 },
            { q: "المثلث الديداكتيكي يتكون من الأقطاب التالية:", options: ["المدرس - الإدارة - الآباء", "المدرسة - القسم - الساحة", "المعرفة - المدرس - المتعلم", "السبورة - الكتاب - الدفتر"], ans: 2 },
            { q: "العلاقة بين 'المدرس والمعرفة' في المثلث الديداكتيكي تسمى:", options: ["علاقة التمثل", "العقد الديداكتيكي", "محور النقل الديداكتيكي", "محور التعلم"], ans: 2 },
            { q: "العلاقة بين 'المتعلم والمعرفة' تسمى:", options: ["محور النقل الديداكتيكي", "محور التواصل", "محور التعلم (التمثل)", "العقد البيداغوجي"], ans: 2 },

            { q: "الاستدلال الاستقرائي يعتبر 'العمود الفقري للتعلم في الابتدائي' لأنه:", options: ["يختصر الوقت", "لا يحتاج إلى وسائل ملموسة", "يتماشى مع النمو الذهني (من المحسوس للمجرد)", "يعتمد على الحفظ التام"], ans: 2 },
            { q: "الانتقال من القاعدة العامة إلى استنتاج خاص يسمى:", options: ["الاستدلال الاستنباطي", "الاستدلال الاستقرائي", "الاستدلال بالخلف", "المثال المضاد"], ans: 0 },
            { q: "يُستخدم 'المثال المضاد' (Contre-exemple) في ديداكتيك الرياضيات من أجل:", options: ["عقاب التلميذ المخطئ", "إثبات عدم صحة عبارة أو تعميم خاطئ", "شرح قاعدة صحيحة", "تزيين السبورة"], ans: 1 },
            { q: "الاستدلال الذي يعتمد على افتراض نقيض العبارة للوصول إلى تناقض يسمى:", options: ["الاستدلال الاستقرائي", "الاستدلال الاستنباطي", "الاستدلال بالخلف (Absurde)", "المثال المضاد"], ans: 2 },

            { q: "أي من التالي ليس من أبعاد الكفاية في الرياضيات؟", options: ["المعرفة (المفاهيم)", "المهارة (التقنيات)", "المواقف", "حفظ النصوص الأدبية"], ans: 3 },
            { q: "العملية التي يقوم بها الأستاذ لتحويل 'المعرفة العالمة' إلى 'معرفة قابلة للتدريس' هي:", options: ["النقل الديداكتيكي", "العقد البيداغوجي", "التنشيط الصفي", "التقويم التشخيصي"], ans: 0 },
            { q: "حسب نظرية Brousseau، المرحلة التي يقدم فيها الأستاذ وضعية-مشكلة تتضمن عائقاً تسمى:", options: ["أنشطة الدعم", "أنشطة التقويم", "أنشطة البناء", "أنشطة الترفيه"], ans: 2 },
            { q: "مجموع القواعد الضمنية والصريحة التي تنظم العلاقة بين المدرس والمتعلم والمعرفة هو:", options: ["القانون الداخلي", "العقد الديداكتيكي", "الميثاق الوطني", "البيداغوجيا الفارقية"], ans: 1 },
            { q: "الحساب الذهني يهدف إلى تنمية المرونة العددية وتحرير:", options: ["ذاكرة العمل (Working Memory)", "الذاكرة طويلة الأمد", "الذاكرة البصرية", "الذاكرة الحركية"], ans: 0 },
            { q: "حساب 7+9 بأخذ 1 من ال7 ليتمم ال9 إلى عشرة يسمى استراتيجية:", options: ["التفكيك", "التعويض", "التكملة إلى العشرة الموالية", "التخمين"], ans: 2 },
            { q: "المقاربة المعتمدة في المنهاج (C-P-A) تعني:", options: ["حساب - فيزياء - جبر", "ملموس - شبه ملموس - مجرد", "ملاحظة - فرضية - نتيجة", "معرفة - تطبيق - تحليل"], ans: 1 },

            { q: "الأداة التي تعتبر جسراً بين 'المناولة بالمكعبات' و 'الترميز المجرد' هي:", options: ["الكوس", "جدول العد (Place Value Chart)", "الآلة الحاسبة", "البركار"], ans: 1 },
            { q: "الهدف من الحساب التقديري (Estimation) هو:", options: ["الحصول على نتيجة دقيقة 100%", "تضييع الوقت", "إيجاد رتبة مقدار للنتيجة وتنمية الحس النقدي", "حفظ جداول الضرب"], ans: 2 },
            { q: "المعنى الديداكتيكي لعملية الطرح الذي يجيب عن 'كم ينقصني لأصل إلى...؟' يسمى:", options: ["الطرح بالإزالة", "الطرح بالمقارنة", "الطرح بالمكمل", "القسمة الإقليدية"], ans: 2 },

            { q: "عائق 'تأثير الدرج' في المحيط يتمثل في اعتقاد التلميذ أن:", options: ["محيط الشكل المدرج المجوف أطول بكثير من المستطيل المحيط به", "الدرج لا يمكن قياسه", "المحيط يقل كلما زادت الزوايا", "المساحة تساوي المحيط"], ans: 0 },

            // Additional Mixed Questions to reach 70
            { q: "يُعرف مفهوم 'التعدي' (Transitivité) في مقارنة الأطوال بأنه:", options: ["قياس الطول بالمسطرة", "إذا كان أ أطول من ب، وب أطول من ج، فإن أ أطول من ج حتماً", "حساب المحيط", "استعمال خيط للقياس"], ans: 1 },
            { q: "التعامل مع النقود في الابتدائي يعتبر المدخل الواقعي الوحيد لـ:", options: ["الهندسة الفضائية", "مفهوم التناسبية", "الأعداد العشرية قبل دراستها نظرياً", "الأعداد الكسرية"], ans: 2 },
            { q: "طريقة 'البقال' في رد الصرف تعتمد ذهنياً على:", options: ["الضرب", "الجمع التصاعدي (التكملة)", "القسمة الإقليدية", "الطرح العمودي فقط"], ans: 1 },
            { q: "لعب الأدوار (سوق القسم) يفيد في ديداكتيك الرياضيات لـ:", options: ["الترفيه عن التلاميذ فقط", "إضفاء 'معنى' على عمليات الجمع والطرح عبر وضعية مجتمعية", "حفظ جدول الضرب", "إسكات التلاميذ"], ans: 1 },

            { q: "القاعدة الديداكتيكية للتعامل مع الفاصلة في جداول التحويل هي:", options: ["حذف الفاصلة نهائياً", "تحريكها عشوائياً", "رقم الوحدات يوضع دائماً في خانة الوحدة المعبر عنها", "وضع الفاصلة في أول خانة دائماً"], ans: 2 },

            { q: "النمذجة الرياضية لعملية القسمة تشمل مفهومي:", options: ["الضم والإضافة", "التوزيع العادل (المشاركة) والاحتواء (التجميع)", "المكمل والفرق", "الطي واللصق"], ans: 1 },
            { q: "بناء جداول الضرب يجب أن يعتمد أساساً على:", options: ["الحفظ الصم منذ اليوم الأول", "القفزات على المستقيم العددي أو الشبكات المربعة", "استعمال الآلة الحاسبة", "النقل من السبورة"], ans: 1 },
            { q: "أهم قاعدة في الاستدلال الاستنباطي هي:", options: ["إذا كانت المقدمات صحيحة فالنتيجة صحيحة بالضرورة", "ملاحظة الأمثلة لصياغة القاعدة", "الاعتماد على الحواس للبرهنة", "استخدام المثال المضاد"], ans: 0 },
            { q: "عند استخدام مكعبات دينز، 'الصفيحة' (المربع) تمثل:", options: ["الوحدات", "العشرات", "المئات", "الآلاف"], ans: 2 },
            { q: "بيداغوجياً، دور المدرس في أنشطة البناء (Situation-Problème) هو:", options: ["الملقن المباشر للحل", "الميسر ومدير الصراع المعرفي", "مراقب الهدوء فقط", "تصحيح الدفاتر"], ans: 1 }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const endScreen = document.getElementById('end-screen');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackText = document.getElementById('feedback-text');
        const progressBar = document.getElementById('progress-bar');
        const questionCounter = document.getElementById('question-counter');
        const scoreDisplay = document.getElementById('score-display');
        const finalScore = document.getElementById('final-score');
        const finalMessage = document.getElementById('final-message');

        // Shuffle questions array to ensure variety if needed (Optional, keeping linear for now based on chapters)
        // questions.sort(() => Math.random() - 0.5);

        function startQuiz() {
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            quizScreen.classList.add('fade-in');
            loadQuestion();
        }

        function loadQuestion() {
            answered = false;
            nextBtn.classList.add('hidden');
            feedbackContainer.classList.add('hidden');
            optionsContainer.innerHTML = '';
            
            const currentQ = questions[currentQuestionIndex];
            
            // Update UI Counters
            questionCounter.innerText = `سؤال ${currentQuestionIndex + 1} / ${questions.length}`;
            scoreDisplay.innerText = `النقاط: ${score}`;
            progressBar.style.width = `${((currentQuestionIndex) / questions.length) * 100}%`;
            
            // Render Question
            questionText.innerText = currentQ.q;
            
            // Render Options
            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-right bg-gray-50 hover:bg-gray-100 border-2 border-gray-200 text-gray-800 font-semibold py-4 px-6 rounded-xl transition duration-300 transform hover:-translate-y-1";
                btn.innerText = opt;
                btn.onclick = () => selectOption(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIndex, selectedBtn) {
            if (answered) return;
            answered = true;

            const currentQ = questions[currentQuestionIndex];
            const allButtons = optionsContainer.children;

            // Disable all buttons
            for (let btn of allButtons) {
                btn.classList.add('disabled-btn');
                btn.classList.remove('hover:bg-gray-100', 'hover:-translate-y-1');
            }

            if (selectedIndex === currentQ.ans) {
                selectedBtn.classList.add('correct-answer');
                score++;
                scoreDisplay.innerText = `النقاط: ${score}`;
                feedbackText.innerText = "إجابة صحيحة! أحسنت 👏";
                feedbackText.className = "font-bold text-xl mb-4 text-green-600";
            } else {
                selectedBtn.classList.add('wrong-answer');
                // Highlight the correct answer
                allButtons[currentQ.ans].classList.add('correct-answer');
                feedbackText.innerText = "إجابة خاطئة 😔 الجواب الصحيح مظلل بالأخضر.";
                feedbackText.className = "font-bold text-xl mb-4 text-red-600";
            }

            feedbackContainer.classList.remove('hidden');
            nextBtn.classList.remove('hidden');
            
            // Scroll to next button on mobile
            nextBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                quizScreen.classList.remove('fade-in');
                void quizScreen.offsetWidth; // trigger reflow
                quizScreen.classList.add('fade-in');
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            quizScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            endScreen.classList.add('fade-in');
            
            finalScore.innerText = `${score} / ${questions.length}`;
            
            let percentage = (score / questions.length) * 100;
            if (percentage >= 90) {
                finalMessage.innerText = "ممتاز! أنت خبير في ديداكتيك الرياضيات 🌟";
                finalMessage.className = "text-2xl font-bold mb-8 text-green-600";
            } else if (percentage >= 70) {
                finalMessage.innerText = "جيد جداً! لديك مستوى متقدم 👏";
                finalMessage.className = "text-2xl font-bold mb-8 text-blue-600";
            } else if (percentage >= 50) {
                finalMessage.innerText = "مقبول! راجع بعض الفصول لتعزيز معارفك 👍";
                finalMessage.className = "text-2xl font-bold mb-8 text-yellow-600";
            } else {
                finalMessage.innerText = "تحتاج إلى مراجعة مكثفة للملفات 📚";
                finalMessage.className = "text-2xl font-bold mb-8 text-red-600";
            }
        }
    </script>
